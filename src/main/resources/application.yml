spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:student_management}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:7c222fb2927d828af22f592134e8932480637c0d7edc49a58bb03a45c3639df3cbb421f1e761d49c693a18a51dbf1a1d}
  expiration: 86400000 # 24 hours
